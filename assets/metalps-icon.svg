<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Green-to-blue background gradient, slight diagonal like the original -->
    <linearGradient id="bg" x1="0.2" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3BD44A"/>
      <stop offset="48%" stop-color="#15A69C"/>
      <stop offset="100%" stop-color="#1461E6"/>
    </linearGradient>

    <!-- Glass fill: translucent white, brighter at the top -->
    <linearGradient id="glass" x1="0" y1="120" x2="0" y2="400"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.20"/>
    </linearGradient>

    <!-- Edge highlight: bright top edge fading out -->
    <linearGradient id="edge" x1="0" y1="120" x2="0" y2="400"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14"
                    flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="b"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.12"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="bg-clip">
      <rect x="28" y="28" width="456" height="456" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Rounded-square background -->
  <rect x="28" y="28" width="456" height="456" rx="100" ry="100"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle highlight sheen at top -->
  <ellipse cx="256" cy="42" rx="200" ry="90"
           fill="#ffffff" opacity="0.07" clip-path="url(#bg-clip)"/>

  <!-- Glass "ps" lettering, oblique to match the Metal M's lean -->
  <g transform="translate(240, 308) skewX(-12)" filter="url(#glow)">
    <!-- Depth shadow -->
    <text x="0" y="3" text-anchor="middle"
          font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="bold" font-size="280"
          fill="#000000" opacity="0.08"
          letter-spacing="-5">ps</text>

    <!-- Main frosted-glass text -->
    <text x="0" y="0" text-anchor="middle"
          font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="bold" font-size="280"
          fill="url(#glass)" stroke="url(#edge)" stroke-width="1.5"
          letter-spacing="-5">ps</text>
  </g>
</svg>
